<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knockout Bracket</title>

    <link rel="stylesheet" href="style.css">

    <style>
        .bracket {
            display: flex;
            justify-content: space-between;
            gap: 40px;
            margin-top: 30px;
        }

        .side {
            width: 40%;
        }

        .match {
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 12px;
            margin: 20px 0;
        }

        .team {
            display: flex;
            align-items: center;
            margin: 8px 0;
        }

        .team img {
            width: 28px;
            height: 20px;
            object-fit: cover;
            margin-right: 10px;
            border: 1px solid #ccc;
        }

        .center {
            width: 20%;
            text-align: center;
        }

        .champion {
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
        }

        .trophy {
            font-size: 80px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

</nav>
