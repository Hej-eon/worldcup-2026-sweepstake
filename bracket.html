<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Bracket Fixed</title></head>
<body>
<!-- Replace only script section in your existing file with this version -->
<script src="data.js"></script>
<script>
roundOf16.forEach((match, index) => {
  const slot = document.getElementById(`r16-${index + 1}`);
  if (!slot) return;
  slot.innerHTML = `
<div class="team">${match.home ? `<img src="${getFlag(match.home)}"> ${match.home.name}` : '?'}</div>
<div class="owner">${match.home ? match.home.owner : ''}</div>
<div class="team">${match.away ? `<img src="${getFlag(match.away)}"> ${match.away.name}` : '?'}</div>
<div class="owner">${match.away ? match.away.owner : ''}</div>`;
});

quarterFinals.forEach((match, index) => {
  const slot = document.getElementById(`qf-${index + 1}`);
  if (!slot) return;
  slot.innerHTML = `
<div class="team">${match.home ? `<img src="${getFlag(match.home)}"> ${match.home.name}` : '?'}</div>
<div class="owner">${match.home ? match.home.owner : ''}</div>
<div class="team">${match.away ? `<img src="${getFlag(match.away)}"> ${match.away.name}` : '?'}</div>
<div class="owner">${match.away ? match.away.owner : ''}</div>`;
});
</script>
</body>
</html>
